on:
  push:
    branches:
      - main
jobs:
  workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 2
          submodules: true
      - run: bash .github/workflows/build_chess_openings.sh
      - run: bash .github/workflows/record_sha.sh
      - run: bash .github/workflows/build_react.sh
        env:
          VITE_LICHESS_PERSONAL_ACCESS_TOKEN: ${{ secrets.LICHESS_PERSONAL_ACCESS_TOKEN }}
      - run: bash .github/workflows/deploy_to_firebase.sh '${{ secrets.SA_KEY }}'
